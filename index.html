"<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Superankor: Fraktionssplittring — Spela Online</title>
    <meta name="description" content="Superankor: Fraktionssplittring. Hantera ankfraktioner, strid i skogar, grottor och rymden. Byt krigare med vänner!">
    <meta name="keywords" content="superankor, fraktionssplittring, ankspel, klickerspel, rpg html">
    <style>
        body { font-family: 'Arial', sans-serif; margin: 0; padding: 0; background-color: #11141a; color: #ffffff; display: flex; flex-direction: column; align-items: center; min-height: 100vh; user-select: none; }
        header { background-color: #1b222c; width: 100%; text-align: center; padding: 12px 0; border-bottom: 2px solid #ffbc00; font-weight: bold; }
        .container { flex: 1; width: 100%; max-width: 500px; padding: 15px; padding-bottom: 110px; }
        .card { background-color: #1b222c; border-radius: 16px; padding: 15px; margin-bottom: 15px; border: 1px solid #2c3848; }
        button { background-color: #ffbc00; border: none; border-radius: 10px; padding: 12px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px; }
        button:active { transform: translateY(2px); }
        input { width: 100%; padding: 12px; background: #252f3d; border: 2px solid #3d4d63; border-radius: 10px; color: white; margin-bottom: 10px; text-align: center; }
        .monster-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .monster-card { background: #252f3d; padding: 10px; border-radius: 10px; text-align: center; border: 2px solid #3d4d63; }
        .tab-content { width: 100%; }
        .hidden { display: none !important; }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; max-width: 500px; background: #1b222c; display: flex; justify-content: space-around; padding: 10px 0; border-top: 2px solid #2c3848; z-index: 100; }
        .nav-btn { background: #252f3d; color: white; padding: 10px; width: 20%; border-radius: 8px; font-size: 11px; }
    </style>
</head>
<body>

<header><h1>Superankor</h1> | Mynt: <span id="coins-display">150</span> 🪙</header>

<div class="container">
    <div id="tab-home" class="tab-content">
        <div class="card"><h2>🦆 Operativt Högkvarter</h2><div id="home-monsters-grid" class="monster-grid"></div></div>
    </div>
    
    <div id="tab-promo" class="tab-content hidden">
        <div class="card">
            <h2>🎁 Aktivera promokod</h2>
            <input type="text" id="promo-input" placeholder="ANGE KOD" style="text-transform: uppercase;">
            <button onclick="activatePromo()">Använd kod</button>
        </div>
    </div>
</div>

<div class="bottom-nav">
    <button class="nav-btn" onclick="switchTab('home')">Basen</button>
    <button class="nav-btn" onclick="switchTab('promo')">Koder</button>
</div>

<script>
    let gameState = { coins: 150, inventory: [], teamUids: [], food: { cheese: 0, donut: 0, toast: 0 } };

    function updateUI() { document.getElementById('coins-display').innerText = gameState.coins; }
    function switchTab(t) {
        document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
        document.getElementById('tab-' + t).classList.remove('hidden');
    }

    function activatePromo() {
        let code = document.getElementById('promo-input').value.trim().toUpperCase();
        
        // Международные коды
        if (code === 'SWE-ANCKARSTRÖM') { gameState.coins += 150; alert('🇸🇪 Kod aktiverad! +150 mynt!'); }
        else if (code === 'RUS-COSMODUCK') { gameState.coins += 300; alert('🇷🇺 Kod aktiverad! +300 mynt!'); }
        else if (code === 'USA-DUCKAVENGER') { gameState.coins += 200; alert('🇺🇸 Kod aktiverad! +200 mynt!'); }
        
        // Админские коды
        else if (code === 'DEV-GODMODE') { alert('👑 ADMIN: GOD MODE AKTIVERAD!'); }
        else if (code === 'DEV-GIGAMYNT') { gameState.coins += 100000; alert('👑 ADMIN: +100k mynt!'); }
        else if (code === 'DEV-MAXLEVEL') { alert('👑 ADMIN: ALLA NIVÅER UPP-LÅSTA!'); }
        else if (code === 'DEV-DUCKREDUX') { alert('👑 ADMIN: CYBORG-ANKA TILLAGD!'); }
        else if (code === 'DEV-SKAFFAKÄK') { alert('👑 ADMIN: SKAFFERIET ÄR FULLT!'); }
        
        else { alert('❌ Felaktig kod!'); return; }
        
        document.getElementById('promo-input').value = '';
        updateUI();
    }

    // Инициализация
    updateUI();
</script>

</body>
</html>
