<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <title>Superankor: Fraktionssplittring — Master Version</title>
    <style>
        /* Стили для всех элементов игры */
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #0d1117; color: #c9d1d9; margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: auto; }
        .card { background-color: #161b22; border: 1px solid #30363d; border-radius: 10px; padding: 20px; margin-bottom: 20px; }
        .hero { border-left: 5px solid #58a6ff; }
        .villain { border-left: 5px solid #f85149; }
        button { background-color: #238636; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; }
        #settings-panel { padding: 15px; border: 1px solid #58a6ff; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Superankor: Fraktionssplittring</h1>
        <div id="status-bar">Mynt: <span id="coins">150</span> | Nivå: <span id="level">1</span></div>
        <button onclick="toggleSettings()">⚙️ Inställningar / Настройки</button>
    </header>

    <div id="settings-panel" class="card hidden">
        <h2>Inställningar / Настройки</h2>
        <button onclick="setLang('sv')">🇸🇪 Svenska</button>
        <button onclick="setLang('ru')">🇷🇺 Русский</button>
        <button onclick="toggleMusic()">🎵 Musik (På/Av)</button>
    </div>

    <div class="card">
        <h2>Dina Ankor / Ваши утки</h2>
        <div id="duck-grid" class="grid"></div>
    </div>

    <div class="card">
        <h2>🎁 Promokoder</h2>
        <input type="text" id="promo-input" placeholder="ANGE KOD">
        <button onclick="activatePromo()">Använd kod</button>
    </div>
</div>

<script>
    // ПОЛНАЯ БАЗА ДАННЫХ ИГРЫ
    const gameData = {
        lang: 'sv',
        music: false,
        coins: 150,
        level: 1,
        // Полный список уток (имена, фракции, сила)
        ducks: [
            { id: 1, name: 'Viking Anka', faction: 'hero', power: 50 },
            { id: 2, name: 'Cyborg Anka', faction: 'villain', power: 150 },
            { id: 3, name: 'Kosmos Anka', faction: 'hero', power: 200 },
            { id: 4, name: 'Ninja Anka', faction: 'villain', power: 120 },
            { id: 5, name: 'Zombie Anka', faction: 'villain', power: 80 },
            { id: 6, name: 'Superhjälte', faction: 'hero', power: 300 }
        ],
        // Логика 50 уровней
        levels: Array.from({length: 50}, (_, i) => ({ id: i + 1, difficulty: i * 10 }))
    };

    function toggleSettings() {
        document.getElementById('settings-panel').classList.toggle('hidden');
    }

    function setLang(l) {
        gameData.lang = l;
        alert(l === 'sv' ? 'Språk ändrat' : 'Язык изменен');
        // Здесь можно дописать функцию обновления всех текстов на странице
    }

    function toggleMusic() {
        gameData.music = !gameData.music;
        alert(gameData.music ? '🎵 Musik PÅ' : '🎵 Musik AV');
    }

    function activatePromo() {
        const code = document.getElementById('promo-input').value.trim().toUpperCase();
        
        // Логика кодов
        const codes = {
            'SWE-ANCKARSTRÖM': () => { gameData.coins += 150; },
            'RUS-COSMODUCK': () => { gameData.coins += 300; },
            'USA-DUCKAVENGER': () => { gameData.coins += 200; },
            'DEV-GODMODE': () => alert('👑 GOD MODE!'),
            'DEV-GIGAMYNT': () => { gameData.coins += 100000; },
            'DEV-MAXLEVEL': () => { gameData.level = 50; },
            'DEV-DUCKREDUX': () => alert('👑 CYBORG ADDED'),
            'DEV-SKAFFAKÄK': () => alert('👑 FOOD FULL')
        };

        if (codes[code]) {
            codes[code]();
            updateUI();
        } else {
            alert('❌ Fel kod!');
        }
    }

    function updateUI() {
        document.getElementById('coins').innerText = gameData.coins;
        document.getElementById('level').innerText = gameData.level;
    }

    // Отрисовка всех уток с разделением по фракциям
    function renderDucks() {
        const grid = document.getElementById('duck-grid');
        grid.innerHTML = gameData.ducks.map(duck => `
            <div class="card ${duck.faction}">
                <h3>${duck.name}</h3>
                <p>Fraktion: ${duck.faction}</p>
                <p>Power: ${duck.power}</p>
            </div>
        `).join('');
    }

    renderDucks();
    updateUI();
</script>

</body>
</html>
