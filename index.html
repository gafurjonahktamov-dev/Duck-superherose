<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Мир Монстров: Арена и Друзья</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #1a1a1f;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            user-select: none;
        }

        header {
            background-color: #25252b;
            width: 100%;
            text-align: center;
            padding: 12px 0;
            box-shadow: 0 4px 8px rgba(0,0,0,0.4);
            font-size: 18px;
            font-weight: bold;
        }

        .container {
            flex: 1;
            width: 100%;
            max-width: 500px;
            padding: 15px;
            box-sizing: border-box;
            padding-bottom: 110px;
        }

        .card {
            background-color: #25252b;
            border-radius: 16px;
            padding: 15px;
            box-shadow: 0 6px 12px rgba(0,0,0,0.3);
            margin-bottom: 15px;
        }

        button {
            background-color: #ff9f43;
            color: white;
            border: none;
            border-radius: 10px;
            padding: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 0 #d35400;
        }
        button:active { transform: translateY(4px); box-shadow: none; }

        input {
            width: 100%;
            padding: 12px;
            background: #2f2f38;
            border: 2px solid #4e4e5a;
            border-radius: 10px;
            color: white;
            font-size: 16px;
            box-sizing: border-box;
            margin-bottom: 10px;
            text-align: center;
        }

        .rare { color: #54a0ff; } .super-rare { color: #5f27cd; } .epic { color: #ff00ff; } .legendary { color: #f1c40f; }

        .monster-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 10px;
        }

        .monster-card {
            background: #2f2f38;
            border: 3px solid #4e4e5a;
            border-radius: 12px;
            padding: 8px;
            text-align: center;
            cursor: pointer;
        }
        .monster-card.selected { border-color: #2ecc71; background: #223e2b; }
        .monster-avatar { font-size: 36px; margin-bottom: 5px; }
        .monster-name { font-size: 11px; font-weight: bold; }

        .capsule-item {
            background: #2f2f38;
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .level-badge-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            max-height: 250px;
            overflow-y: auto;
        }
        .level-badge {
            background: #2f2f38;
            padding: 10px 0;
            border-radius: 8px;
            text-align: center;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
        }
        .level-badge.unlocked { background: #10ac84; color: white; }
        .level-badge.locked { opacity: 0.3; cursor: not-allowed; }

        /* ВИЗУАЛЬНОЕ ПОЛЕ БОЯ */
        .battle-field {
            background: linear-gradient(180deg, #1e3c72 0%, #2a5298 100%);
            border-radius: 16px;
            height: 240px;
            position: relative;
            overflow: hidden;
            border: 3px solid #ff4757;
            display: flex;
            justify-content: space-between;
            padding: 20px;
            box-sizing: border-box;
            align-items: center;
        }

        .field-side {
            display: flex;
            flex-direction: column;
            gap: 15px;
            justify-content: center;
            width: 35%;
        }

        .field-unit {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .field-unit.active-choice { transform: scale(1.15); filter: drop-shadow(0 0 8px #fff); }
        .field-unit.dead { opacity: 0.2; filter: grayscale(1); pointer-events: none; }
        
        .field-avatar { font-size: 42px; }
        
        .field-hp-bar-bg {
            background: #555;
            width: 50px;
            height: 6px;
            border-radius: 3px;
            overflow: hidden;
            margin-top: 4px;
        }
        .field-hp-bar { background: #2ecc71; height: 100%; width: 100%; transition: width 0.2s; }
        .field-unit.enemy .field-hp-bar { background: #ff4757; }

        .damage-pop {
            position: absolute;
            color: #ff4757;
            font-weight: bold;
            font-size: 20px;
            animation: popUp 0.8s ease-out forwards;
            pointer-events: none;
            z-index: 10;
            text-shadow: 0 2px 4px #000;
        }
        @keyframes popUp {
            0% { opacity: 1; transform: translateY(0) scale(1); }
            100% { opacity: 0; transform: translateY(-30px) scale(1.3); }
        }

        .skills-panel {
            background: #111;
            padding: 10px;
            border-radius: 12px;
            margin-top: 10px;
            text-align: center;
        }
        .skills-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 5px;
        }

        .bottom-nav {
            position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
            width: 100%; max-width: 500px; background-color: #25252b;
            display: flex; justify-content: space-around; padding: 12px 0;
            box-shadow: 0 -4px 10px rgba(0,0,0,0.4); border-top: 2px solid #3e3e4a; z-index: 100;
        }
        .nav-btn { background-color: #341f97; box-shadow: 0 3px 0 #1e1250; padding: 10px; font-size: 14px; width: 22%; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <header>
        Монет: <span id="coins-display">100</span> 🪙
    </header>

    <div class="container">
        
        <div id="tab-home" class="tab-content">
            <div class="card" style="text-align: center;">
                <h2>🏠 Твой Отряд</h2>
                <p style="font-size: 13px; color: #aaa;">Твой уникальный ID-код для друзей:</p>
                <h3 id="my-id-display" style="color: #ff9f43; letter-spacing: 2px; margin: 5px 0;">ID-0000</h3>
                <p style="font-size: 12px; color: #888;">Выбери ровно 3 персонажей в бой:</p>
                <div id="home-monsters-grid" class="monster-grid"></div>
            </div>
        </div>

        <div id="tab-shop" class="tab-content hidden">
            <div class="card">
                <h2>🛒 Капсулы Редкости</h2>
                <div id="capsules-market"></div>
            </div>
        </div>

        <div id="tab-levels" class="tab-content hidden">
            <div id="levels-selection-card" class="card">
                <h2>🗺️ Выбор Уровня</h2>
                <div id="levels-badge-container" class="level-badge-grid"></div>
            </div>

            <div id="battle-field-card" class="card hidden">
                <div style="display: flex; justify-content: space-between; margin-bottom: 5px;">
                    <span id="turn-indicator" style="font-weight:bold; color:#ff9f43;">Ход Противника...</span>
                    <span id="location-title" style="font-size:12px; color:#aaa;">Арена</span>
                </div>
                <div id="battle-arena" class="battle-field">
                    <div id="player-side" class="field-side"></div>
                    <div id="enemy-side" class="field-side"></div>
                </div>
                <div id="skills-control" class="skills-panel hidden">
                    <span id="selected-hero-name" style="font-size:13px; font-weight:bold; color:#2ecc71;">Выбери атаку:</span>
                    <div id="skills-buttons" class="skills-grid"></div>
                </div>
            </div>
        </div>

        <div id="tab-friends" class="tab-content hidden">
            <div id="friends-main-card" class="card" style="text-align: center;">
                <h2>⚔️ Вызов Друга</h2>
                <p style="font-size: 13px; color: #aaa;">Введи ID-код своего друга, чтобы сразиться с его отрядом из 3 монстров!</p>
                <input type="text" id="friend-id-input" placeholder="Например: ID-4829">
                <button style="width: 100%;" onclick="startFriendBattle()">Бросить Вызов!</button>
            </div>
        </div>

    </div>

    <div class="bottom-nav">
        <button class="nav-btn" style="background-color: #ff9f43; box-shadow: 0 3px 0 #d35400;" onclick="switchTab('home')">Отряд</button>
        <button class="nav-btn" style="background-color: #a55eea; box-shadow: 0 3px 0 #8854d0;" onclick="switchTab('shop')">Капсулы</button>
        <button class="nav-btn" style="background-color: #10ac84; box-shadow: 0 3px 0 #0f8f6d;" onclick="switchTab('levels')">Битва</button>
        <button class="nav-btn" style="background-color: #ff4757; box-shadow: 0 3px 0 #ee5253;" onclick="switchTab('friends')">Друзья</button>
    </div>

    <script>
        const monsterDatabase = {
            slime:    { name: 'Слизень', rarity: 'rare', hp: 90, avatar: '🟢', skills: [{n: 'Плевок', d: 15}, {n: 'Слизь', d: 22}] },
            goblin:   { name: 'Гоблин',   rarity: 'rare', hp: 85, avatar: '👺', skills: [{n: 'Кража', d: 18}, {n: 'Нож', d: 25}] },
            dragon:   { name: 'Дракон',   rarity: 'super-rare', hp: 130, avatar: '🐉', skills: [{n: 'Пламя', d: 28}, {n: 'Когти', d: 35}] },
            wizard:   { name: 'Маг',      rarity: 'super-rare', hp: 110, avatar: '🧙‍♂️', skills: [{n: 'Лед', d: 24}, {n: 'Разряд', d: 38}] },
            golem:    { name: 'Голем',    rarity: 'epic', hp: 210, avatar: '🗿', skills: [{n: 'Таран', d: 20}, {n: 'Обвал', d: 30}] },
            pekka:    { name: 'Рыцарь',   rarity: 'epic', hp: 170, avatar: '🤖', skills: [{n: 'Меч', d: 35}, {n: 'Сокрушение', d: 50}] },
            phoenix:  { name: 'Феникс',   rarity: 'legendary', hp: 250, avatar: '🦅', skills: [{n: 'Взрыв', d: 45}, {n: 'Пике', d: 60}] }
        };

        const capsulesConfig = [
            { id: 'rare', name: 'Редкая Капсула', price: 30, textClass: 'rare', contains: ['slime', 'goblin'] },
            { id: 'super-rare', name: 'Сверхредкая Капсула', price: 70, textClass: 'super-rare', contains: ['dragon', 'wizard'] },
            { id: 'epic', name: 'Эпическая Капсула', price: 150, textClass: 'epic', contains: ['golem', 'pekka'] },
            { id: 'legendary', name: 'Легендарная Капсула', price: 350, textClass: 'legendary', contains: ['phoenix'] }
        ];

        let gameState = {
            coins: 100,
            ownedIds: ['slime', 'goblin'],
            team: [],
            currentLevel: 1,
            myId: ''
        };

        let battleState = null;

        function loadGame() {
            const saved = localStorage.getItem('lego_rivals_friends_v2');
            if (saved) gameState = JSON.parse(saved);
            
            // Если ID еще нет, создаем уникальный случайный код
            if (!gameState.myId) {
                gameState.myId = 'ID-' + Math.floor(1000 + Math.random() * 9000);
            }
            
            document.getElementById('my-id-display').innerText = gameState.myId;
            updateUI();
            renderCapsules();
        }

        function saveGame() {
            localStorage.setItem('lego_rivals_friends_v2', JSON.stringify(gameState));
        }

        function switchTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            if (tabName === 'home') document.getElementById('tab-home').classList.remove('hidden');
            if (tabName === 'shop') document.getElementById('tab-shop').classList.remove('hidden');
            if (tabName === 'friends') document.getElementById('tab-friends').classList.remove('hidden');
            if (tabName === 'levels') {
                document.getElementById('tab-levels').classList.remove('hidden');
                document.getElementById('levels-selection-card').classList.remove('hidden');
                document.getElementById('battle-field-card').classList.add('hidden');
                renderLevelBadges();
            }
        }

        function renderCapsules() {
            const container = document.getElementById('capsules-market');
            container.innerHTML = '';
            capsulesConfig.forEach(c => {
                const div = document.createElement('div');
                div.className = 'capsule-item';
                div.innerHTML = `
                    <div><span class="${c.textClass}" style="font-weight:bold;">${c.name}</span><br><small>Цена: ${c.price} 🪙</small></div>
                    <button style="padding:6px 12px; font-size:13px; background:#2ecc71; box-shadow:0 3px 0 #27ae60;" onclick="buyCapsule('${c.id}')">Купить</button>
                `;
                container.appendChild(div);
            });
        }

        function buyCapsule(id) {
            const conf = capsulesConfig.find(c => c.id === id);
            if (gameState.coins >= conf.price) {
                gameState.coins -= conf.price;
                const rId = conf.contains[Math.floor(Math.random() * conf.contains.length)];
                if (!gameState.ownedIds.includes(rId)) gameState.ownedIds.push(rId);
                alert(`🎉 Выпал персонаж: ${monsterDatabase[rId].name}!`);
                updateUI();
                saveGame();
            } else {
                alert('Мало монет!');
            }
        }

        function updateUI() {
            document.getElementById('coins-display').innerText = gameState.coins;
            const grid = document.getElementById('home-monsters-grid');
            grid.innerHTML = '';
            gameState.ownedIds.forEach(id => {
                const m = monsterDatabase[id];
                const isSelected = gameState.team.includes(id);
                const div = document.createElement('div');
                div.className = `monster-card ${isSelected ? 'selected' : ''}`;
                div.innerHTML = `
                    <div class="monster-avatar">${m.avatar}</div>
                    <div class="monster-name ${m.rarity}">${m.name}</div>
                `;
                div.onclick = () => toggleSelectTeam(id);
                grid.appendChild(div);
            });
        }

        function toggleSelectTeam(id) {
            const idx = gameState.team.indexOf(id);
            if (idx > -1) {
                gameState.team.splice(idx, 1);
            } else {
                if (gameState.team.length >= 3) {
                    alert('Максимум 3 персонажа в поле боя!');
                    return;
                }
                gameState.team.push(id);
            }
            updateUI();
            saveGame();
        }

        function renderLevelBadges() {
            const container = document.getElementById('levels-badge-container');
            container.innerHTML = '';
            for (let i = 1; i <= 50; i++) {
                const badge = document.createElement('div');
                const isUnlocked = i <= gameState.currentLevel;
                badge.className = `level-badge ${isUnlocked ? 'unlocked' : 'locked'}`;
                badge.innerText = i;
                if (isUnlocked) badge.onclick = () => startBattleCore('level', i);
                container.appendChild(badge);
            }
        }

        // БИТВА С ДРУГОМ ПО ID-КОДУ
        function startFriendBattle() {
            const inputVal = document.getElementById('friend-id-input').value.trim();
            if (!inputVal.startsWith('ID-') || inputVal.length < 5) {
                alert('Неверный формат кода! Введи, например: ID-1234');
                return;
            }
            if (gameState.team.length === 0) {
                alert('Сначала выбери до 3 персонажей в свой отряд!');
                return;
            }
            
            // Переключаемся на вкладку битвы и запускаем дуэль
            switchTab('levels');
            startBattleCore('friend', inputVal);
        }

        // ОБЩЕЕ ЯДРО ДЛЯ ЗАПУСКА И ЛЕВЕЛОВ, И ДРУЗЕЙ
        function startBattleCore(mode, targetData) {
            document.getElementById('levels-selection-card').classList.add('hidden');
            document.getElementById('battle-field-card').classList.remove('hidden');

            let playerUnits = gameState.team.map((id, index) => ({
                id: id, uid: 'p_' + index, name: monsterDatabase[id].name,
                avatar: monsterDatabase[id].avatar, hp: monsterDatabase[id].hp,
                maxHp: monsterDatabase[id].hp, skills: monsterDatabase[id].skills
            }));

            let enemyUnits = [];

            if (mode === 'level') {
                document.getElementById('location-title').innerText = `Кампания: Уровень ${targetData}`;
                let enemyHp = 60 + (targetData * 25);
                let enemyDmg = 12 + (targetData * 4);
                let locIdx = Math.min(4, Math.floor((targetData - 1) / 10));
                enemyUnits = [{
                    uid: 'e_0', name: 'Босс Уровня',
                    avatar: ['👹', '🧛', '🐺', '🐉', '💀'][locIdx],
                    hp: enemyHp, maxHp: enemyHp, dmg: enemyDmg, isFriendBot: false
                }];
            } else if (mode === 'friend') {
                document.getElementById('location-title').innerText = `Дуэль против ${targetData}`;
                // Имитируем команду друга на основе его ID
                // Чтобы у разных ID были разные случайные монстры
                let seed = parseInt(targetData.replace('ID-', '')) || 5555;
                let keys = Object.keys(monsterDatabase);
                
                for(let i=0; i<3; i++) {
                    let mId = keys[(seed + i) % keys.length];
                    let m = monsterDatabase[mId];
                    enemyUnits.push({
                        uid: 'e_' + i, name: 'Герой Друга', avatar: m.avatar,
                        hp: m.hp, maxHp: m.hp, dmg: Math.floor(m.skills[0].d * 0.9), isFriendBot: true
                    });
                }
            }

            battleState = {
                mode: mode, lvl: targetData, player: playerUnits, enemy: enemyUnits,
                selectedPlayerUid: null, phase: 'enemy_turn'
            };

            renderField();
            setTimeout(executeEnemyTurn, 1000);
        }

        function renderField() {
            const pSide = document.getElementById('player-side'); pSide.innerHTML = '';
            battleState.player.forEach(u => {
                const div = document.createElement('div'); div.id = u.uid;
                div.className = `field-unit ${u.hp <= 0 ? 'dead' : ''} ${battleState.selectedPlayerUid === u.uid ? 'active-choice' : ''}`;
                div.innerHTML = `<div class="field-avatar">${u.avatar}</div><div class="field-hp-bar-bg"><div class="field-hp-bar" style="width: ${(u.hp / u.maxHp) * 100}%"></div></div>`;
                if (battleState.phase === 'player_turn' && u.hp > 0) div.onclick = () => selectHeroForAttack(u.uid);
                pSide.appendChild(div);
            });

            const eSide = document.getElementById('enemy-side'); eSide.innerHTML = '';
            battleState.enemy.forEach(u => {
                const div = document.createElement('div'); div.id = u.uid;
                div.className = `field-unit enemy ${u.hp <= 0 ? 'dead' : ''}`;
                div.innerHTML = `<div class="field-avatar">${u.avatar}</div><div class="field-hp-bar-bg"><div class="field-hp-bar" style="width: ${(u.hp / u.maxHp) * 100}%"></div></div>`;
                eSide.appendChild(div);
            });
        }

        function executeEnemyTurn() {
            if (!battleState) return;
            document.getElementById('turn-indicator').innerText = 'Ход Противника...';
            document.getElementById('turn-indicator').style.color = '#ff4757';
            document.getElementById('skills-control').classList.add('hidden');

            let alivePlayers = battleState.player.filter(u => u.hp > 0);
            let aliveEnemies = battleState.enemy.filter(u => u.hp > 0);

            if (alivePlayers.length > 0 && aliveEnemies.length > 0) {
                // Случайный живой враг бьет случайного живого игрока
                let attacker = aliveEnemies[Math.floor(Math.random() * aliveEnemies.length)];
                let target = alivePlayers[Math.floor(Math.random() * alivePlayers.length)];
                
                target.hp -= attacker.dmg;
                if (target.hp < 0) target.hp = 0;

                createDamagePop(target.uid, attacker.dmg);
                renderField();

                if (battleState.player.filter(u => u.hp > 0).length === 0) {
                    alert('💀 Твой отряд полностью разбит!');
                    closeBattleField();
                    return;
                }
            }

            battleState.phase = 'player_turn';
            document.getElementById('turn-indicator').innerText = 'ТВОЙ ХОД! Жми на своего бойца';
            document.getElementById('turn-indicator').style.color = '#2ecc71';
            renderField();
        }

        function selectHeroForAttack(uid) {
            battleState.selectedPlayerUid = uid;
            renderField();
            const unit = battleState.player.find(u => u.uid === uid);
            document.getElementById('selected-hero-name').innerText = `Способности ${unit.avatar}:`;
            
            const skillsContainer = document.getElementById('skills-buttons');
            skillsContainer.innerHTML = '';
            unit.skills.forEach(skill => {
                const b = document.createElement('button');
                b.style.fontSize = '13px'; b.style.background = '#341f97'; b.style.boxShadow = '0 3px 0 #1e1250';
                b.innerHTML = `${skill.n}<br><small>${skill.d} DMG</small>`;
                b.onclick = () => useSkill(unit, skill);
                skillsContainer.appendChild(b);
            });
            document.getElementById('skills-control').classList.remove('hidden');
        }

        function useSkill(attacker, skill) {
            let aliveEnemies = battleState.enemy.filter(u => u.hp > 0);
            if (aliveEnemies.length === 0) return;

            // Бьем первого живого врага в ряду
            let target = aliveEnemies[0];
            target.hp -= skill.d;
            if (target.hp < 0) target.hp = 0;

            createDamagePop(target.uid, skill.d);
            battleState.selectedPlayerUid = null;
            document.getElementById('skills-control').classList.add('hidden');
            renderField();

            if (battleState.enemy.filter(u => u.hp > 0).length === 0) {
                let prize = battleState.mode === 'level' ? (50 + (battleState.lvl * 20)) : 200; // Фиксированный куш за друга
                gameState.coins += prize;
                
                if (battleState.mode === 'level' && battleState.lvl === gameState.currentLevel && gameState.currentLevel < 50) {
                    gameState.currentLevel++;
                }
                alert(`🏆 ПОБЕДА НА АРЕНЕ!\nНаграда: +${prize} 🪙`);
                closeBattleField();
                return;
            }

            battleState.phase = 'enemy_turn';
            setTimeout(executeEnemyTurn, 1200);
        }

        function createDamagePop(unitUid, value) {
            const el = document.getElementById(unitUid);
            if (!el) return;
            const pop = document.createElement('div');
            pop.className = 'damage-pop'; pop.innerText = `-${value}`;
            el.appendChild(pop);
            setTimeout(() => pop.remove(), 800);
        }

        function closeBattleField() {
            battleState = null;
            saveGame();
            updateUI();
            document.getElementById('battle-field-card').classList.add('hidden');
            document.getElementById('levels-selection-card').classList.remove('hidden');
            renderLevelBadges();
        }

        window.onload = loadGame;
    </script>
</body>
</html>
