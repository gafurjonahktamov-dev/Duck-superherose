<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Моя Игра: Битвы Монстров</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #1e1e24;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            user-select: none;
            -webkit-user-select: none;
        }

        header {
            background-color: #2a2a32;
            width: 100%;
            text-align: center;
            padding: 15px 0;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            font-size: 20px;
            font-weight: bold;
        }

        .container {
            flex: 1;
            width: 100%;
            max-width: 500px;
            padding: 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 20px;
            padding-bottom: 100px;
        }

        .card {
            background-color: #2a2a32;
            border-radius: 12px;
            padding: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }

        /* Крупные удобные кнопки для телефона */
        button {
            background-color: #ff9f43;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 15px 20px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            transition: transform 0.1s, background-color 0.2s;
            box-shadow: 0 4px 0 #d35400;
        }

        button:active {
            transform: translateY(4px);
            box-shadow: none;
        }

        button.secondary {
            background-color: #5f27cd;
            box-shadow: 0 4px 0 #341f97;
        }

        button:disabled {
            background-color: #57606f;
            box-shadow: 0 4px 0 #2f3542;
            cursor: not-allowed;
        }

        .monster-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #3e3e4a;
        }

        .monster-item:last-child {
            border-bottom: none;
        }

        .stats-text {
            font-size: 12px;
            color: #ffdd59;
        }

        .price-tag {
            font-weight: bold;
            color: #f1c40f;
        }

        .discount {
            color: #2ecc71;
            font-size: 13px;
        }

        /* Экран боя */
        #battle-log {
            background-color: #111;
            border-radius: 8px;
            padding: 10px;
            height: 150px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 13px;
            color: #00ff00;
            margin-top: 10px;
            text-align: left;
        }

        /* Панель меню Clash Royale */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 500px;
            background-color: #2a2a32;
            display: flex;
            justify-content: space-around;
            padding: 10px 0;
            box-shadow: 0 -4px 10px rgba(0,0,0,0.4);
            border-top: 2px solid #3e3e4a;
            z-index: 100;
        }

        .nav-btn {
            background-color: #341f97;
            box-shadow: 0 3px 0 #1e1250;
            padding: 12px;
