<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Супер-Утки: Лига Супергероев</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #11141a;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            user-select: none;
        }

        header {
            background-color: #1b222c;
            width: 100%;
            text-align: center;
            padding: 12px 0;
            box-shadow: 0 4px 8px rgba(0,0,0,0.5);
            font-size: 18px;
            font-weight: bold;
            border-bottom: 2px solid #ffbc00;
        }

        .container {
            flex: 1;
            width: 100%;
            max-width: 500px;
            padding: 15px;
            box-sizing: border-box;
            padding-bottom: 110px;
        }

        .card {
            background-color: #1b222c;
            border-radius: 16px;
            padding: 15px;
            box-shadow: 0 6px 12px rgba(0,0,0,0.4);
            margin-bottom: 15px;
            border: 1px solid #2c3848;
        }

        button {
            background-color: #ffbc00;
            color: #000;
            border: none;
            border-radius: 10px;
            padding: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 0 #b38400;
        }
        button:active { transform: translateY(4px); box-shadow: none; }

        input {
            width: 100%;
            padding: 12px;
            background: #252f3d;
            border: 2px solid #3d4d63;
            border-radius: 10px;
            color: white;
            font-size: 16px;
            box-sizing: border-box;
            margin-bottom: 10px;
            text-align: center;
        }

        .rare { color: #54a0ff; } .super-rare { color: #a55eea; } .epic { color: #ff4757; } .legendary { color: #ffbc00; }

        .monster-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 10px;
        }

        .monster-card {
            background: #252f3d;
            border: 3px solid #3d4d63;
            border-radius: 12px;
            padding: 8px;
            text-align: center;
            cursor: pointer;
        }
        .monster-card.selected { border-color: #ffbc00; background: #2c321d; }
        .monster-avatar { font-size: 38px; margin-bottom: 5px; }
        .monster-name { font-size: 11px; font-weight: bold; }

        .capsule-item {
            background: #252f3d;
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .level-badge-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            max-height: 250px;
            overflow-y: auto;
        }
        .level-badge {
            background: #252f3d;
            padding: 10px 0;
            border-radius: 8px;
            text-align: center;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
        }
        .level-badge.unlocked { background: #00d2d3; color: black; }
        .level-badge.locked { opacity: 0.3; cursor: not-allowed; }

        /* СУПЕРГЕРОЙСКОЕ ПОЛЕ БОЯ */
        .battle-field {
            background: linear-gradient(180deg, #10141d 0%, #2c3e50 100%);
            border-radius: 16px;
            height: 240px;
            position: relative;
            overflow: hidden;
            border: 3px solid #ffbc00;
            display: flex;
            justify-content: space-between;
            padding: 20px;
            box-sizing: border-box;
            align-items: center;
        }

        .field-side {
            display: flex;
            flex-direction: column;
            gap: 15px;
            justify-content: center;
            width: 35%;
        }

        .field-unit {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .field-unit.active-choice { transform: scale(1.2); filter: drop-shadow(0 0 10px #ffbc00); }
        .field-unit.dead { opacity: 0.2; filter: grayscale(1); pointer-events: none; }
        
        .field-avatar { font-size: 44px; }
        
        .field-hp-bar-bg {
            background: #444;
            width: 55px;
            height: 6px;
            border-radius: 3px;
            overflow: hidden;
            margin-top: 4px;
        }
        .field-hp-bar { background: #10ac84; height: 100%; width: 100%; transition: width 0.2s; }
        .field-unit.enemy .field-hp-bar { background: #ff4757; }

        .damage-pop {
            position: absolute;
            color: #ff4757;
            font-weight: bold;
            font-size: 22px;
            animation: popUp 0.8s ease-out forwards;
            pointer-events: none;
            z-index: 10;
            text-shadow: 0 2px 4px #000;
        }
        @keyframes popUp {
            0% { opacity: 1; transform: translateY(0) scale(1); }
            100% { opacity: 0; transform: translateY(-35px) scale(1.4); }
        }

        .skills-panel {
            background: #0d1117;
            padding: 12px;
            border-radius: 12px;
            margin-top: 10px;
            text-align: center;
            border: 1px solid #ffbc00;
        }
        .skills-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 5px;
        }

        .bottom-nav {
            position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
            width: 100%; max-width: 500px; background-color: #1b222c;
            display: flex; justify-content: space-around; padding: 12px 0;
            box-shadow: 0 -4px 10px rgba(0,0,0,0.5); border-top: 2px solid #2c3848; z-index: 100;
        }
        .nav-btn { background-color: #252f3d; color: white; box-shadow: 0 3px 0 #151c24; padding: 10px; font-size: 14px; width: 22%; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <header>
        Супер-Монеты: <span id="coins-display">100</span> 🪙
    </header>

    <div class="container">
        
        <div id="tab-home" class="tab-content">
            <div class="card" style="text-align: center;">
                <h2>🦆 Штаб Супер-Уток</h2>
                <p style="font-size: 13px; color: #aaa;">Твой Код Отряда для дуэли с друзьями:</p>
                <h3 id="my-id-display" style="color: #ffbc00; letter-spacing: 2px; margin: 5px 0;">ID-0000</h3>
                <p style="font-size: 12px; color: #9aa0a6;">Выбери 3 уток-супергероев на Арену:</p>
                <div id="home-monsters-grid" class="monster-grid"></div>
            </div>
        </div>

        <div id="tab-shop" class="tab-content hidden">
            <div class="card">
                <h2>🛒 Секретные Капсулы</h2>
                <div id="capsules-market"></div>
            </div>
        </div>

        <div id="tab-levels" class="tab-content hidden">
            <div id="levels-selection-card" class="card">
                <h2>🗺️ Зачистка Прудов (50 Уровней)</h2>
                <div id="levels-badge-container" class="level-badge-grid"></div>
            </div>

            <div id="battle-field-card" class="card hidden">
                <div style="display: flex; justify-content: space-between; margin-bottom: 5px;">
                    <span id="turn-indicator" style="font-weight:bold; color:#ffbc00;">Ход супер-злодеев...</span>
                    <span id="location-title" style="font-size:12px; color:#aaa;">Сектор Боя</span>
                </div>
                <div id="battle-arena" class="battle-field">
                    <div id="player-side" class="field-side"></div>
                    <div id="enemy-side" class="field-side"></div>
                </div>
                <div id="skills-control" class="skills-panel hidden">
                    <span id="selected-hero-name" style="font-size:13px; font-weight:bold; color:#ffbc00;">Супер-Атака:</span>
                    <div id="skills-buttons" class="skills-grid"></div>
                </div>
            </div>
        </div>

        <div id="tab-friends" class="tab-content hidden">
            <div id="friends-main-card" class="card" style="text-align: center;">
                <h2>⚔️ Битва по Коду</h2>
                <p style="font-size: 13px; color: #aaa;">Введи ID-код друга, чтобы проверить, чьи утки круче!</p>
                <input type="text" id="friend-id-input" placeholder="ID-1234">
                <button style="width: 100%;" onclick="startFriendBattle()">Вызвать на Дуэль!</button>
            </div>
        </div>

    </div>

    <div class="bottom-nav">
        <button class="nav-btn" style="background-color: #ffbc00; color: black; box-shadow: 0 3px 0 #b38400;" onclick="switchTab('home')">Штаб</button>
        <button class="nav-btn" onclick="switchTab('shop')">Капсулы</button>
        <button class="nav-btn" onclick="switchTab('levels')">Арена</button>
        <button class="nav-btn" onclick="switchTab('friends')">Друзья</button>
    </div>

    <script>
        const monsterDatabase = {
            spiderDuck:  { name: 'Утка-Паук',    rarity: 'rare', hp: 90, avatar: '🕸️', skills: [{n: 'Паутина', d: 16}, {n: 'Удар крылом', d: 24}] },
            capDuck:     { name: 'Утка-Капитан',  rarity: 'rare', hp: 95, avatar: '🛡️', skills: [{n: 'Бросок щита', d: 18}, {n: 'Кряк Свободы', d: 22}] },
            ironDuck:    { name: 'Железный Селезень', rarity: 'super-rare', hp: 120, avatar: '🤖', skills: [{n: 'Лазер из клюва', d: 28}, {n: 'Ракетный залп', d: 38}] },
            thorDuck:    { name: 'Утка-Тор',     rarity: 'super-rare', hp: 130, avatar: '⚡', skills: [{n: 'Молот Грозы', d: 30}, {n: 'Призыв молнии', d: 42}] },
            hulkDuck:    { name: 'Халк-Утка',    rarity: 'epic', hp: 220, avatar: '🟢', skills: [{n: 'Халк КРЯК!', d: 20}, {n: 'Сломать пруд', d: 35}] },
            batDuck:     { name: 'Бэт-Утка',     rarity: 'epic', hp: 160, avatar: '🦇', skills: [{n: 'Бэтранг', d: 36}, {n: 'Плащ Ночи', d: 48}] },
            cyborgDuck:  { name: 'Киборг-Утка',  rarity: 'legendary', hp: 260, avatar: '🦾', skills: [{n: 'Кибер-таран', d: 45}, {n: 'Фотонный кряк', d: 65}] }
        };

        const capsulesConfig = [
            { id: 'rare', name: 'Редкая Утка', price: 30, textClass: 'rare', contains: ['spiderDuck', 'capDuck'] },
            { id: 'super-rare', name: 'Сверхредкая Утка', price: 70, textClass: 'super-rare', contains: ['ironDuck', 'thorDuck'] },
            { id: 'epic', name: 'Эпическая Утка', price: 150, textClass: 'epic', contains: ['hulkDuck', 'batDuck'] },
            { id: 'legendary', name: 'ЛЕГЕНДАРНАЯ УТКА', price: 350, textClass: 'legendary', contains: ['cyborgDuck'] }
        ];

        const locations = ['🌾 Чистый Пруд', '🏭 Сточные Воды', '🌆 Крыши Готэма', '🌌 Космическая Станция', '🌋 База Суперзлодеев'];

        let gameState = {
            coins: 100,
            ownedIds: ['spiderDuck', 'capDuck'], 
            team: [],
            currentLevel: 1,
            myId: ''
        };

        let battleState = null;

        function loadGame() {
            const saved = localStorage.getItem('super_ducks_heroes_v1');
            if (saved) gameState = JSON.parse(saved);
            if (!gameState.myId) gameState.myId = 'ID-' + Math.floor(1000 + Math.random() * 9000);
            document.getElementById('my-id-display').innerText = gameState.myId;
            updateUI();
            renderCapsules();
        }

        function saveGame() {
            localStorage.setItem('super_ducks_heroes_v1', JSON.stringify(gameState));
        }

        function switchTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            if (tabName === 'home') document.getElementById('tab-home').classList.remove('hidden');
            if (tabName === 'shop') document.getElementById('tab-shop').classList.remove('hidden');
            if (tabName === 'friends') document.getElementById('tab-friends').classList.remove('hidden');
            if (tabName === 'levels') {
                document.getElementById('tab-levels').classList.remove('hidden');
                document.getElementById('levels-selection-card').classList.remove('hidden');
                document.getElementById('battle-field-card').classList.add('hidden');
                renderLevelBadges();
            }
        }

        function renderCapsules() {
            const container = document.getElementById('capsules-market');
            container.innerHTML = '';
            capsulesConfig.forEach(c => {
                const div = document.createElement('div');
                div.className = 'capsule-item';
                div.innerHTML = `
                    <div><span class="${c.textClass}" style="font-weight:bold;">${c.name}</span><br><small>Цена: ${c.price} 🪙</small></div>
                    <button style="padding:6px 12px; font-size:13px; background:#ffbc00; color:black; box-shadow:0 3px 0 #b38400;" onclick="buyCapsule('${c.id}')">Открыть</button>
                `;
                container.appendChild(div);
            });
        }

        function buyCapsule(id) {
            const conf = capsulesConfig.find(c => c.id === id);
            if (gameState.coins >= conf.price) {
                gameState.coins -= conf.price;
                const rId = conf.contains[Math.floor(Math.random() * conf.contains.length)];
                if (!gameState.ownedIds.includes(rId)) gameState.ownedIds.push(rId);
                alert(`💥 Новая утка в отряде: ${monsterDatabase[rId].name}!`);
                updateUI();
                saveGame();
            } else {
                alert('Не хватает супер-монет!');
            }
        }

        function updateUI() {
            document.getElementById('coins-display').innerText = gameState.coins;
            const grid = document.getElementById('home-monsters-grid');
            grid.innerHTML = '';
            gameState.ownedIds.forEach(id => {
                const m = monsterDatabase[id];
                const isSelected = gameState.team.includes(id);
                const div = document.createElement('div');
                div.className = `monster-card ${isSelected ? 'selected' : ''}`;
                div.innerHTML = `
                    <div class="monster-avatar">${m.avatar}</div>
                    <div class="monster-name ${m.rarity}">${m.name}</div>
                `;
                div.onclick = () => toggleSelectTeam(id);
                grid.appendChild(div);
            });
        }

        function toggleSelectTeam(id) {
            const idx = gameState.team.indexOf(id);
            if (idx > -1) {
                gameState.team.splice(idx, 1);
            } else {
                if (gameState.team.length >= 3) {
                    alert('В отряд можно взять максимум 3 утки!');
                    return;
                }
                gameState.team.push(id);
            }
            updateUI();
            saveGame();
        }

        function renderLevelBadges() {
            const container = document.getElementById('levels-badge-container');
            container.innerHTML = '';
            for (let i = 1; i <= 50; i++) {
                const badge = document.createElement('div');
                const isUnlocked = i <= gameState.currentLevel;
                badge.className = `level-badge ${isUnlocked ? 'unlocked' : 'locked'}`;
                badge.innerText = i;
                if (isUnlocked) badge.onclick = () => startBattleCore('level', i);
                container.appendChild(badge);
            }
        }

        function startFriendBattle() {
            const inputVal = document.getElementById('friend-id-input').value.trim();
            if (!inputVal.startsWith('ID-') || inputVal.length < 5) {
                alert('Введите правильный код друга! (Пример: ID-1234)');
                return;
            }
            if (gameState.team.length === 0) {
                alert('Выбери супер-уток в штабе!');
                return;
            }
            switchTab('levels');
            startBattleCore('friend', inputVal);
        }

        function startBattleCore(mode, targetData) {
            document.getElementById('levels-selection-card').classList.add('hidden');
            document.getElementById('battle-field-card').classList.remove('hidden');

            let playerUnits = gameState.team.map((id, index) => ({
                id: id, uid: 'p_' + index, name: monsterDatabase[id].name,
                avatar: monsterDatabase[id].avatar, hp: monsterDatabase[id].hp,
                maxHp: monsterDatabase[id].hp, skills: monsterDatabase[id].skills
            }));

            let enemyUnits = [];

            if (mode === 'level') {
                document.getElementById('location-title').innerText = `Уровень ${targetData}`;
                let enemyHp = 60 + (targetData * 26);
                let enemyDmg = 10 + (targetData * 4);
                let locIdx = Math.min(4, Math.floor((targetData - 1) / 10));
                
                let enemyAvatars = ['🦢', '🦤', '🦅', '🦉', '🦖'];
                enemyUnits = [{
                    uid: 'e_0', name: 'Злобный Гусь-Босс',
                    avatar: enemyAvatars[locIdx],
                    hp: enemyHp, maxHp: enemyHp, dmg: enemyDmg
                }];
            } else if (mode === 'friend') {
                document.getElementById('location-title').innerText = `Дуэль против ${targetData}`;
                let seed = parseInt(targetData.replace('ID-', '')) || 7777;
                let keys = Object.keys(monsterDatabase);
                
                for(let i=0; i<3; i++) {
                    let mId = keys[(seed + i) % keys.length];
                    let m = monsterDatabase[mId];
                    enemyUnits.push({
                        uid: 'e_' + i, name: 'Утка Друга', avatar: m.avatar,
                        hp: m.hp, maxHp: m.hp, dmg: Math.floor(m.skills[0].d * 0.95)
                    });
                }
            }

            battleState = {
                mode: mode, lvl: targetData, player: playerUnits, enemy: enemyUnits,
                selectedPlayerUid: null, phase: 'enemy_turn'
            };

            renderField();
            setTimeout(executeEnemyTurn, 1000);
        }

        function renderField() {
            const pSide = document.getElementById('player-side'); pSide.innerHTML = '';
            battleState.player.forEach(u => {
                const div = document.createElement('div'); div.id = u.uid;
                div.className = `field-unit ${u.hp <= 0 ? 'dead' : ''} ${battleState.selectedPlayerUid === u.uid ? 'active-choice' : ''}`;
                div.innerHTML = `<div class="field-avatar">${u.avatar}</div><div class="field-hp-bar-bg"><div class="field-hp-bar" style="width: ${(u.hp / u.maxHp) * 100}%"></div></div>`;
                if (battleState.phase === 'player_turn' && u.hp > 0) div.onclick = () => selectHeroForAttack(u.uid);
                pSide.appendChild(div);
            });

            const eSide = document.getElementById('enemy-side'); eSide.innerHTML = '';
            battleState.enemy.forEach(u => {
                const div = document.createElement('div'); div.id = u.uid;
                div.className = `field-unit enemy ${u.hp <= 0 ? 'dead' : ''}`;
                div.innerHTML = `<div class="field-avatar">${u.avatar}</div><div class="field-hp-bar-bg"><div class="field-hp-bar" style="width: ${(u.hp / u.maxHp) * 100}%"></div></div>`;
                eSide.appendChild(div);
            });
        }

        function executeEnemyTurn() {
            if (!battleState) return;
            document.getElementById('turn-indicator').innerText = 'Ход Врага...';
            document.getElementById('turn-indicator').style.color = '#ff4757';
            document.getElementById('skills-control').classList.add('hidden');

            let alivePlayers = battleState.player.filter(u => u.hp > 0);
            let aliveEnemies = battleState.enemy.filter(u => u.hp > 0);

            if (alivePlayers.length > 0 && aliveEnemies.length > 0) {
                let attacker = aliveEnemies[Math.floor(Math.random() * aliveEnemies.length)];
                let target = alivePlayers[Math.floor(Math.random() * alivePlayers.length)];
                
                target.hp -= attacker.dmg;
                if (target.hp < 0) target.hp = 0;

                createDamagePop(target.uid, attacker.dmg);
                renderField();

                if (battleState.player.filter(u => u.hp > 0).length === 0) {
                    alert('💀 Команда супер-уток пала! Открой новые капсулы.');
                    closeBattleField();
                    return;
                }
            }

            battleState.phase = 'player_turn';
            document.getElementById('turn-indicator').innerText = 'ТВОЙ ХОД! Жми на свою утку';
            document.getElementById('turn-indicator').style.color = '#00d2d3';
            renderField();
        }

        function selectHeroForAttack(uid) {
            battleState.selectedPlayerUid = uid;
            renderField();
            const unit = battleState.player.find(u => u.uid === uid);
            document.getElementById('selected-hero-name').innerText = `Супер-Удары ${unit.avatar}:`;
            
            const skillsContainer = document.getElementById('skills-buttons');
            skillsContainer.innerHTML = '';
            unit.skills.forEach(skill => {
                const b = document.createElement('button');
                b.style.fontSize = '13px'; b.style.background = '#252f3d'; b.style.color = '#ffbc00'; b.style.boxShadow = '0 3px 0 #151c24';
                b.innerHTML = `${skill.n}<br><small>${skill.d} DMG</small>`;
                b.onclick = () => useSkill(unit, skill);
                skillsContainer.appendChild(b);
            });
            document.getElementById('skills-control').classList.remove('hidden');
        }

        function useSkill(attacker, skill) {
            let aliveEnemies = battleState.enemy.filter(u => u.hp > 0);
            if (aliveEnemies.length === 0) return;

            let target = aliveEnemies[0];
            target.hp -= skill.d;
            if (target.hp < 0) target.hp = 0;

            createDamagePop(target.uid, skill.d);
            battleState.selectedPlayerUid = null;
            document.getElementById('skills-control').classList.add('hidden');
            renderField();

            if (battleState.enemy.filter(u => u.hp > 0).length === 0) {
                let prize = battleState.mode === 'level' ? (50 + (battleState.lvl * 25)) : 250; 
                gameState.coins += prize;
                
                if (battleState.mode === 'level' && battleState.lvl === gameState.currentLevel && gameState.currentLevel < 50) {
                    gameState.currentLevel++;
                }
                alert(`🏆 ПОБЕДА УТОК!\nПолучено супер-монет: +${prize} 🪙`);
                closeBattleField();
                return;
            }

            battleState.phase = 'enemy_turn';
            setTimeout(executeEnemyTurn, 1200);
        }

        function createDamagePop(unitUid, value) {
            const el = document.getElementById(unitUid);
            if (!el) return;
            const pop = document.createElement('div');
            pop.className = 'damage-pop'; pop.innerText = `-${value}`;
            el.appendChild(pop);
            setTimeout(() => pop.remove(), 800);
        }

        function closeBattleField() {
            battleState = null;
            saveGame();
            updateUI();
            document.getElementById('battle-field-card').classList.add('hidden');
            document.getElementById('levels-selection-card').classList.remove('hidden');
            renderLevelBadges();
        }

        window.onload = loadGame;
    </script>
</body>
</html>
