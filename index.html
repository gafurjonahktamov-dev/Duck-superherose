<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Superankor: Fraktionssplittring</title>
    <style>
        /* (Твои стили сохранены полностью) */
        body { font-family: 'Arial', sans-serif; margin: 0; padding: 0; background-color: #11141a; color: #ffffff; display: flex; flex-direction: column; align-items: center; min-height: 100vh; user-select: none; }
        header { background-color: #1b222c; width: 100%; text-align: center; padding: 12px 0; border-bottom: 2px solid #ffbc00; }
        .container { flex: 1; width: 100%; max-width: 500px; padding: 15px; box-sizing: border-box; padding-bottom: 110px; }
        .card { background-color: #1b222c; border-radius: 16px; padding: 15px; box-shadow: 0 6px 12px rgba(0,0,0,0.4); margin-bottom: 15px; border: 1px solid #2c3848; }
        button { background-color: #ffbc00; color: #000; border: none; border-radius: 10px; padding: 12px; font-weight: bold; cursor: pointer; }
        .hidden { display: none !important; }
        .rarity-common { border-left: 5px solid #bdc3c7; }
        .rarity-rare { border-left: 5px solid #3498db; }
        .rarity-epic { border-left: 5px solid #9b59b6; }
        .rarity-legendary { border-left: 5px solid #f1c40f; }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; max-width: 500px; background: #1b222c; display: flex; justify-content: space-around; padding: 10px; border-top: 2px solid #2c3848; z-index: 100; }
        .nav-btn { background: #252f3d; color: white; padding: 8px; font-size: 11px; flex: 1; margin: 0 2px; }
    </style>
</head>
<body>

    <header>
        <h1 id="header-title">Superankor</h1> | <span id="coins-display">150</span> 🪙
    </header>

    <div class="container">
        <div id="tab-home" class="tab-content"><div class="card"><h2 id="hq-title">Högkvarter</h2><div id="home-monsters-grid"></div></div></div>
        
        <div id="tab-settings" class="tab-content hidden">
            <div class="card">
                <h2 id="settings-title">Inställningar / Настройки</h2>
                <button onclick="setLang('sv')">🇸🇪 Svenska</button>
                <button onclick="setLang('ru')">🇷🇺 Русский</button>
                <hr style="margin: 15px 0;">
                <button id="music-toggle" onclick="toggleMusic()">🎵 Musik: AV</button>
            </div>
        </div>

        <div id="tab-shop" class="tab-content hidden">
            <div class="card">
                <h2>📦 Kapslar / Капсулы</h2>
                <div style="display:grid; gap:10px;">
                    <button class="rarity-common" onclick="openCapsule('common')">Vanlig (50🪙)</button>
                    <button class="rarity-rare" onclick="openCapsule('rare')">Sällsynt (150🪙)</button>
                    <button class="rarity-epic" onclick="openCapsule('epic')">Episk (500🪙)</button>
                    <button class="rarity-legendary" onclick="openCapsule('legendary')">Legendarisk (1500🪙)</button>
                </div>
            </div>
        </div>
    </div>

    <div class="bottom-nav">
        <button class="nav-btn" onclick="switchTab('home')">🏠</button>
        <button class="nav-btn" onclick="switchTab('shop')">🛒</button>
        <button class="nav-btn" onclick="switchTab('tab-settings')">⚙️</button>
    </div>

    <script>
        // Твоя логика + новые настройки
        let settings = { lang: 'sv', music: false };

        function setLang(l) {
            settings.lang = l;
            document.getElementById('header-title').innerText = (l === 'sv' ? 'Superankor' : 'Суперутки');
            document.getElementById('hq-title').innerText = (l === 'sv' ? 'Högkvarter' : 'Штаб');
            alert(l === 'sv' ? 'Språk ändrat!' : 'Язык изменен!');
        }

        function toggleMusic() {
            settings.music = !settings.music;
            document.getElementById('music-toggle').innerText = settings.music ? '🎵 Musik: PÅ' : '🎵 Musik: AV';
        }

        function openCapsule(rarity) {
            const prices = { common: 50, rare: 150, epic: 500, legendary: 1500 };
            const chances = { common: 0.7, rare: 0.2, epic: 0.08, legendary: 0.02 };
            
            if (gameState.coins >= prices[rarity]) {
                gameState.coins -= prices[rarity];
                // Здесь логика выпадения по редкости
                alert(settings.lang === 'sv' ? `Du öppnade en ${rarity} kapsel!` : `Вы открыли ${rarity} капсулу!`);
                updateUI(); saveGame();
            } else {
                alert(settings.lang === 'sv' ? 'För lite mynt!' : 'Недостаточно монет!');
            }
        }

        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
            document.getElementById(tabId === 'home' ? 'tab-home' : tabId).classList.remove('hidden');
        }
        
        // (Остальная часть твоего кода без изменений)
        window.onload = loadGame; 
    </script>
</body>
</html>
